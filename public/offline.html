<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>You're Offline — Sehri Finder</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #022c22;
            color: #f5f0e8;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }

        .container {
            max-width: 400px;
        }

        .moon {
            width: 80px;
            height: 80px;
            margin: 0 auto 2rem;
            background: linear-gradient(135deg, #FFD700, #B8860B);
            border-radius: 50%;
            position: relative;
            box-shadow: 0 0 40px rgba(212, 175, 55, 0.3);
        }

        .moon::after {
            content: '';
            position: absolute;
            top: 8px;
            right: 8px;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            background: #022c22;
        }

        h1 {
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 0.75rem;
            color: #D4AF37;
        }

        p {
            font-size: 0.95rem;
            line-height: 1.6;
            opacity: 0.6;
            margin-bottom: 2rem;
        }

        .retry-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: linear-gradient(135deg, #D4AF37, #B8860B);
            color: #022c22;
            font-weight: 700;
            padding: 0.875rem 2rem;
            border-radius: 999px;
            border: none;
            font-size: 0.9rem;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .retry-btn:hover {
            transform: scale(1.05);
        }

        .retry-btn:active {
            transform: scale(0.95);
        }

        .verse {
            margin-top: 3rem;
            padding-top: 1.5rem;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            font-style: italic;
            opacity: 0.3;
            font-size: 0.8rem;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="moon"></div>
        <h1>You're Offline</h1>
        <p>It seems you've lost your internet connection. Please reconnect and try again — your Sehri spots will be
            waiting!</p>
        <button class="retry-btn" onclick="window.location.reload()">
            ↻ Try Again
        </button>
        <p class="verse">"And whoever puts their trust in Allah, He will be enough for them." — Qur'an 65:3</p>
    </div>
</body>

</html>
