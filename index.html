  <style>
    /* Custom Leaflet tooltip for city pins */
    .leaflet-city-tooltip {
      background: rgba(10, 46, 35, 0.75) !important;
      backdrop-filter: blur(8px) !important;
      -webkit-backdrop-filter: blur(8px) !important;
      border: 1px solid rgba(212, 175, 55, 0.3) !important;
      border-radius: 12px !important;
      padding: 6px 12px !important;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5), inset 0 0 10px rgba(212, 175, 55, 0.1) !important;
      color: rgba(255, 255, 255, 0.95) !important;
      transition: all 0.3s ease;
    }

    .leaflet-city-tooltip::before {
      border-top-color: rgba(10, 46, 35, 0.75) !important;
    }

    .major-city-label {
      background: rgba(10, 46, 35, 0.85) !important;
      border: 1px solid rgba(212, 175, 55, 0.5) !important;
      font-size: 1.1em !important;
      text-shadow: 0 0 10px rgba(212, 175, 55, 0.3);
    }

    /* Custom HTML Marker Styling */
    .custom-div-icon {
      background: transparent;
      border: none;
    }

    .marker-pin {
      width: 12px;
      height: 12px;
      background: #D4AF37;
      border-radius: 50%;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 10px #D4AF37, 0 0 20px #D4AF37;
      border: 2px solid #0A2E23;
      z-index: 2;
    }

    .marker-pulse {
      width: 30px;
      height: 30px;
      background: rgba(212, 175, 55, 0.4);
      border-radius: 50%;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation: ping-slow 2s cubic-bezier(0, 0, 0.2, 1) infinite;
      z-index: 1;
    }

    .major-city-marker .marker-pin {
      width: 16px;
      height: 16px;
      background: #FFD700;
      box-shadow: 0 0 15px #FFD700, 0 0 30px #D4AF37;
    }

    .major-city-marker .marker-pulse {
      width: 45px;
      height: 45px;
      background: rgba(255, 215, 0, 0.5);
      animation-duration: 1.5s;
    }

    @keyframes ping-slow {

      75%,
      100% {
        transform: translate(-50%, -50%) scale(2.5);
        opacity: 0;
      }
    }

    /* Hide Leaflet attribution */
    .leaflet-control-attribution {
      display: none !important;
    }
  </style>

          // Also define as globally accessible variables for some module environments
          if (typeof sessionStorage === 'undefined') { window.sessionStorage = mockStore; }
          if (typeof localStorage === 'undefined') { window.localStorage = mockStore; }

        console.error('Aggressive polyfill failed:', e);
